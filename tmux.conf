# Shell Setup
set -g default-shell /usr/bin/fish

# Barra de estado arriba + conf
set -g status-style "bg=#2b2b2b,fg=#a9b7c6"
set -g status-position top
set -g status-interval 2 
set -g window-status-style "bg=#2b2b2b,fg=#a9b7c6"
set -g window-status-current-style "bg=#5a5a5a,fg=#ffffff"
set -g status-left "#[bg=#4a3aa7, fg=#e6e1f9,bold] [#S] -> #[default] "
set -g status-left-length 30
set -g status-right "#(bash ~/.config/tmux/scripts/status.sh)"
set -g status-right-length 100

# Crear paneles
bind -n C-o split-window -h
bind -n C-l split-window -v
# Moverse entre paneles
set -g extended-keys on
bind -n C-S-Left select-pane -L
bind -n C-S-Right select-pane -R
bind -n C-S-Up select-pane -U
bind -n C-S-Down select-pane -D

# Crear/Cambiar/Matar Sesion
bind -n M-s new-session
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n
# Crear/Cambiar/Matar ventana 
bind -n M-n new-window
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-Left previous-window
bind -n M-Right next-window

# Falto agregar la feature para matar paneles, ventanas y sesiones individualmente 
# otras interesentas son las shell integration marks

# Neovim
set -g focus-events on # Buscar contexto
